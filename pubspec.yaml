name: rasikh
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.5.3
dependencies:
  flutter:
    sdk: flutter
  # -------------------------------------------
  # iOS-style Icons
  # -------------------------------------------
  # Provides the Cupertino Icons font for iOS-style icons in Flutter apps.
  cupertino_icons:
  awesome_dialog:
  # -------------------------------------------
  # PDF and File Utilities
  # -------------------------------------------
  # Library for generating and manipulating PDF documents programmatically.
  pdf: ^3.11.3
  # Opens files on the device using native apps for viewing.
  open_file: ^3.5.10
  # Simple key-value persistent storage for saving small user data locally.
  shared_preferences: ^2.3.0
  google_fonts:
  webview_flutter:
  app_settings:
  # -------------------------------------------
  # Localization & Dependency Injection
  # -------------------------------------------
  # Easy localization framework supporting multiple languages and formats.
  easy_localization: ^3.0.3
  flutter_secure_storage:
  # A simple service locator for dependency injection throughout the app.
  get_it: ^7.7.0

  # Lightweight event bus for decoupled event communication.
  event_bus: ^2.0.1

  # -------------------------------------------
  # Data Structures & Functional Programming
  # -------------------------------------------
  # Helps implement value equality for objects to optimize state comparisons.
  equatable: ^2.0.7

  # Functional programming tools including Option, Either, and Task monads.
  dartz: ^0.10.1
  shimmer_animation:


  # -------------------------------------------
  # UI Utilities & Network
  # -------------------------------------------
  # Responsive size configuration helper for adapting UI across screen sizes.
  size_config: ^2.0.3

  # Powerful HTTP client with support for interceptors, cancellation, and file uploads.
  dio: ^5.4.0

  # Provides paths for storing files and data on device (documents, cache, temp).
  path_provider: ^2.1.2

  # -------------------------------------------
  # Location and Map Services
  # -------------------------------------------
  # Access to GPS location and location permissions with real-time updates.
  geolocator: ^9.0.2
  animate_do: ^3.3.4

  # Carousel slider widget for displaying scrollable lists with animations.
  carousel_slider: ^5.0.0

  # Smooth and customizable page indicators for PageView widgets.
  smooth_page_indicator: ^1.2.0+3

  # Staggered animations for list and grid items to enhance UI presentation.
  flutter_staggered_animations: ^1.0.0

  # -------------------------------------------
  # Connectivity Utilities
  # -------------------------------------------
  # Provides network connectivity status and changes notifications.
  connectivity_plus: ^6.1.0

  # Checks internet connection availability through pings.
  internet_connection_checker: ^1.0.0

  # Adapter for Dio to support additional HTTP features.
  dio_adapter: ^1.7.0

  # Custom popup menu widget for context menus with flexible styling.
  custom_pop_up_menu: ^1.2.4

  # -------------------------------------------
  # State Management (BLoC)
  # -------------------------------------------
  # Flutter implementation of the BLoC pattern for reactive state management.
  flutter_bloc: ^8.1.3

  # Extension for flutter_bloc that persists BLoC states to disk.
  hydrated_bloc: ^9.1.3

  # -------------------------------------------
  # Widget Libraries and UI Components
  # -------------------------------------------
  # Flutter widget to render SVG images efficiently.
  flutter_svg: ^2.0.9

  # PIN code input fields with validation and formatting.
  pin_code_fields: ^8.0.1

  # Widget for cropping images interactively.
  crop_your_image: ^0.7.5

  # Image picker to select images and videos from the gallery or camera.
  image_picker: ^1.0.7

  # Columns and Rows that include separators between children automatically.
  separated_column: ^3.0.3
  separated_row: ^3.0.3

  # Cache network images locally for faster reloads and better performance.
  cached_network_image: ^3.3.1

  # Expandable panels and accordions for collapsing/expanding content.
  expandable: ^5.0.1

  # Shimmer effect placeholder for loading states to improve UX.
  shimmer: ^3.0.0

  # Play JSON-based Lottie animations created in Adobe After Effects.
  lottie: ^3.0.0

  # Automatic animations applied to widgets on appearance.
  auto_animated: ^3.2.0

  # Powerful animation framework supporting sequences and chaining.
  flutter_animate: ^4.5.0

  # Dots indicator widget for pages or step navigation.
  dots_indicator: ^3.0.0

  # Bottom navigation bar with a convex shape and smooth animations.
  convex_bottom_bar: ^3.2.0

  # International phone number input with validation and formatting.
  intl_phone_number_input: ^0.7.4

  # Country picker widget with flags and dial codes.
  country_picker: ^2.0.26

  # Simple widget to add horizontal or vertical space between UI elements.
  gap: ^3.0.1

  # -------------------------------------------
  # Networking and Logging
  # -------------------------------------------
  # Dio interceptor to prettify network request and response logs.
  pretty_dio_logger: ^1.3.1

  # Highly configurable logger for Dart and Flutter applications.
  logger: ^2.4.0

  # -------------------------------------------
  # Additional UI & Utilities
  # -------------------------------------------
  # Rating bar widget for user rating inputs with stars or other icons.
  flutter_rating_bar: ^4.0.0

  # Launch URLs or open external apps (browser, email, phone) from Flutter.
  url_launcher: ^6.3.0

  # Timezone support library for managing dates and times in different zones.
  timezone: ^0.9.0

  # Runtime permissions handler for Android and iOS.
  permission_handler: ^11.3.1

  # Prebuilt loading animations like spinning circles, dots, and waves.
  loading_animation_widget: ^1.2.1

  # Animated bottom navigation bar with a notch that moves to selected item.
  animated_notch_bottom_bar: ^1.0.3

  # Widget to draw dotted or dashed borders around child widgets.
  dotted_border: ^2.1.0

  # -------------------------------------------
  # Maps and Geocoding
  # -------------------------------------------
  # Flutter plugin to integrate Google Maps with full interactivity.
  google_maps_flutter: ^2.9.0

  # Converts addresses to geographic coordinates and vice versa.
  geocoding: ^3.0.0

  # -------------------------------------------
  # UI Controls and Animations
  # -------------------------------------------
  # Enhanced customizable dropdown button widget.
  dropdown_button2: ^2.3.9

  # Animated text kit for a variety of text animations like fade, typewriter, scale.
  animated_text_kit: ^4.2.2

  # Page transition animations for smooth route changes with effects.
  page_transition: ^2.0.9

  # Utility for renaming app package and project identifiers easily.
  rename: ^3.0.2







dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/langs/
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/anims/

  fonts:
    - family: almarai
      fonts:
        - asset: assets/fonts/almaria/Almarai-Regular.ttf
          weight: 400
          style: normal
        - asset: assets/fonts/almaria/Almarai-Bold.ttf
          weight: 800
          style: normal
        - asset: assets/fonts/almaria/Almarai-Light.ttf
          weight: 300
          style: normal

    - family: Abel
      fonts:
        - asset: assets/fonts/taja/Tajawal-Black.ttf
          weight: 900
        - asset: assets/fonts/taja/Tajawal-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/taja/Tajawal-Bold.ttf
          weight: 700
        - asset: assets/fonts/taja/Tajawal-Medium.ttf
          weight: 500
        - asset: assets/fonts/taja/Tajawal-Regular.ttf
          weight: 400
        - asset: assets/fonts/taja/Tajawal-Light.ttf
          weight: 300
        - asset: assets/fonts/taja/Tajawal-ExtraLight.ttf
          weight: 200